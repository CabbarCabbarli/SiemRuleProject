title: "Suspicious LSASS Memory Access"
id: "rule-02"
description: "LSASS prosesinə qeyri-adi giriş cəhdləri."
detection:
  condition: |
    index=windows sourcetype=XmlWinEventLog:Microsoft-Windows-Sysmon/Operational EventCode=10 
    | search TargetImage="*\\lsass.exe" GrantedAccess IN ("0x1010", "0x1410", "0x1F0FFF")
